apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mlops-student
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Mithreshhh/mlops-.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
