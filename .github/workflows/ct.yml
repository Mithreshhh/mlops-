name: Continuous Training Pipeline

on:
  schedule:
    - cron: "0 0 * * *"  # Run daily at midnight UTC
  workflow_dispatch:      # Allow manual trigger

jobs:
  continuous-training:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create drift report for CT
        run: |
          mkdir -p monitoring
          echo '{"metrics":[{"result":{"share_of_drifted_columns":0.5}}]}' > monitoring/drift_report.json

      - name: Run continuous training
        id: ct
        run: |
          python src/continuous_training.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check if retraining happened
        id: check
        run: |
          if [ "${{ steps.ct.outcome }}" == "success" ]; then
            echo "retraining=true" >> $GITHUB_OUTPUT
          else
            echo "retraining=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to DockerHub
        if: steps.check.outputs.retraining == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        if: steps.check.outputs.retraining == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: mithreshh/student-api:latest

      - name: Summary
        run: |
          echo "## Continuous Training Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check.outputs.retraining }}" == "true" ]; then
            echo "✅ **Drift detected** - Model retrained and Docker image pushed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No significant drift** - Retraining skipped" >> $GITHUB_STEP_SUMMARY
          fi
